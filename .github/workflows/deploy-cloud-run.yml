name: Deploy Streamlit Dashboard to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'meta-method-216117' }}
  REGION: us-central1
  SERVICE_NAME: eda-visualization-dashboard

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push container image
        run: |
          BUILD_ID=$(gcloud builds submit \
            --project "$PROJECT_ID" \
            --tag "gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA" \
            --async \
            --format='value(metadata.build.id)' .)

          echo "Started Cloud Build: $BUILD_ID"

          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project "$PROJECT_ID" \
              --format='value(status)')

            echo "Cloud Build status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              break
            fi

            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "INTERNAL_ERROR" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "EXPIRED" ]; then
              gcloud builds describe "$BUILD_ID" \
                --project "$PROJECT_ID" \
                --format='yaml(status,logUrl,results,images)'
              exit 1
            fi

            sleep 10
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --image "gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --max-instances 2

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format='value(status.url)')
          echo "Cloud Run URL: $URL"
